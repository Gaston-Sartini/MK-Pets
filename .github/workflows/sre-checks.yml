name: SRE Checks

on:
  schedule:
    - cron: '0 9 * * 1'    # Every Monday 9am UTC — weekly health review
  workflow_dispatch:

jobs:
  # ── Health check ──────────────────────────────────────────────────────────
  health:
    name: Health check (production)
    runs-on: ubuntu-latest
    steps:
      - name: Check /api/health endpoint
        run: |
          RESPONSE=$(curl -s -w "\n%{http_code}" https://mk-pets.com.ar/api/health)
          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | head -1)

          echo "HTTP status: $HTTP_CODE"
          echo "Response: $BODY"

          if [ "$HTTP_CODE" != "200" ]; then
            echo "❌ Health check FAILED — HTTP $HTTP_CODE"
            exit 1
          fi

          # Verify database is up
          if echo "$BODY" | grep -q '"database","status":"error"'; then
            echo "❌ Database check FAILED"
            exit 1
          fi

          echo "✅ All systems operational"

  # ── Lighthouse CI ─────────────────────────────────────────────────────────
  lighthouse:
    name: Lighthouse (Core Web Vitals)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Lighthouse CI
        uses: treosh/lighthouse-ci-action@v11
        with:
          urls: |
            https://mk-pets.com.ar
            https://mk-pets.com.ar/productos
          budgetPath: .github/lighthouse-budget.json
          uploadArtifacts: true
          temporaryPublicStorage: true

  # ── Dependency freshness ───────────────────────────────────────────────────
  deps:
    name: Dependency audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - run: npm ci
      - name: Check for critical CVEs
        run: npm audit --audit-level=critical
